name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

    - name: Install tarpaulin
      run: |
        curl -sL https://github.com/xd009642/tarpaulin/releases/latest/download/cargo-tarpaulin-x86_64-unknown-linux-gnu.tar.gz | tar xz
        sudo mv cargo-tarpaulin /usr/local/bin/

    - name: Generate coverage
      run: cargo tarpaulin --out xml --skip-clean

    - name: Upload to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: cobertura.xml
        fail_ci_if_error: false
