name: Pages

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108

      - name: Build WASM
        run: make wasm VERSION=${{ steps.version.outputs.tag }}

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Deploy version
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          mkdir -p gh-pages/${VERSION}
          cp -r target/wasm/* gh-pages/${VERSION}/
          sed "s|__VERSION__|${VERSION}|g" web/root-index.html > gh-pages/index.html
          # Build version list (newest first)
          cd gh-pages
          ITEMS=""
          for d in $(ls -d v* 2>/dev/null | sort -V -r); do
            ITEMS="${ITEMS}      <li><a href=\"${d}/\">${d}</a></li>\n"
          done
          sed "s|__VERSION_LIST__|${ITEMS}|g" ../web/history.html > history.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy ${VERSION}"
          git push
