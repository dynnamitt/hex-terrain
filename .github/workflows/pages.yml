name: Pages

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag source
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          path: src

      - name: Checkout main templates
        uses: actions/checkout@v4
        with:
          ref: main
          path: templates
          sparse-checkout: |
            web/root-index.html
            web/history.html

      - name: Extract version from tag
        id: version
        run: echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Inject release notes into index.html
        working-directory: src
        run: make inject-updates TAG=${{ steps.version.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version 0.2.108

      - name: Build WASM
        working-directory: src
        run: make wasm VERSION=${{ steps.version.outputs.tag }}

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 1

      - name: Deploy version
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          mkdir -p gh-pages/${VERSION}
          cp -r src/target/wasm/* gh-pages/${VERSION}/
          # Determine latest version from deployed directories
          cd gh-pages
          LATEST=$(ls -d v* 2>/dev/null | sort -V | tail -1)
          sed "s|__VERSION__|${LATEST}|g" ../templates/web/root-index.html > index.html
          ITEMS=""
          for d in $(ls -d v* 2>/dev/null | sort -V -r); do
            ITEMS="${ITEMS}      <li><a href=\"${d}/\">${d}</a></li>\n"
          done
          sed "s|__VERSION_LIST__|${ITEMS}|g" ../templates/web/history.html > history.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy ${VERSION}"
          git push
