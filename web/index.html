<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Hex Terrain</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        background: #010102;
      }
      body {
        padding: 5%;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      #game-wrapper {
        flex: 1;
        min-height: 0;
        position: relative;
      }
      #game-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
      #loading-overlay {
        position: absolute;
        inset: 0;
        background: #060d0d;
        border: 1px solid #0a3a3a;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: pulse 2s ease-in-out infinite;
      }
      #loading-overlay span {
        font-family: monospace;
        font-size: 18px;
        color: #00ffcc;
        opacity: 0.6;
      }
      @keyframes pulse {
        0%,
        100% {
          background: #060d0d;
        }
        50% {
          background: #0a1616;
        }
      }
      #loading-overlay.hidden {
        display: none;
      }
      #hint {
        font-family: monospace;
        font-size: 13px;
        color: #00ffcc;
        opacity: 0;
        text-align: center;
        transition: opacity 0.4s;
      }
      #hint.visible {
        opacity: 0.6;
      }
      .keys {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        font-family: monospace;
        font-size: 13px;
        color: #6a7a8a;
      }
      .keys span {
        white-space: nowrap;
      }
      kbd {
        background: #1a2a2a;
        color: #00ffcc;
        border: 1px solid #0a3a3a;
        border-radius: 3px;
        padding: 1px 5px;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div id="hint">click canvas to play</div>
    <div id="game-wrapper">
      <canvas id="game-canvas"></canvas>
      <div id="loading-overlay"><span>loading…</span></div>
    </div>
    <div class="keys">
      <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move</span>
      <span><kbd>Q</kbd><kbd>E</kbd> altitude</span>
      <span><kbd>Scroll</kbd> altitude</span>
      <span><kbd>Mouse</kbd> look</span>
      <span><kbd>Space</kbd> laser-drill</span>
      <span><kbd>Tab</kbd> inspector</span>
    </div>
    <script type="module">
      import init from "./hex-terrain.js";
      const overlay = document.getElementById("loading-overlay");
      const hint = document.getElementById("hint");

      function readyToPlay() {
        overlay.classList.add("hidden");
        hint.classList.add("visible");
        setTimeout(() => hint.classList.remove("visible"), 5000);
      }

      init()
        .then(readyToPlay)
        .catch((error) => {
          if (!error.message.startsWith("Using exceptions for control flow,")) {
            overlay.querySelector("span").textContent = "failed to load";
            throw error;
          }
          readyToPlay();
        });
    </script>
  </body>
</html>
